apiVersion: apps/v1
kind: Deployment
metadata:
  name: front-deployment
  labels:
    app: front
spec:
  replicas: 2
  selector:
    matchLabels:
      app: front
  template:
    metadata:
      labels:
        app: front
    spec:
      containers:
      - name: front-app
        image: 782424855823.dkr.ecr.us-east-1.amazonaws.com/frontend:${IMAGE_TAG}
        ports:
        - containerPort: 80
        env:
        # Aquí conectamos el Nginx del front con el BFF interno
        - name: BFF_PRIVATE_IP
          value: "bff-service"
---
apiVersion: v1
kind: Service
metadata:
  name: front-service
spec:
  type: LoadBalancer
  selector:
    app: front
  ports:
    - protocol: TCP
      port: 80       
      targetPort: 80